name: Linux Runner pe Windows RDP with Tailscale (8GB + 4 Cores)

on:
  workflow_dispatch:

jobs:
  windows-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 9999

    steps:
      - name: Install QEMU, KVM and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf virt-viewer bridge-utils socat
          sudo modprobe kvm

      - name: Download Windows 11 ISO (Latest Evaluation)
        run: |
          wget -O win11.iso https://go.microsoft.com/fwlink/?linkid=2334167

      - name: Create Virtual Disk (80GB)
        run: |
          qemu-img create -f qcow2 windows.qcow2 80G

      - name: Start Windows VM with QEMU (8GB RAM + 4 Cores + RDP Port Forward)
        run: |
          qemu-system-x86_64 \
            -m 8192 -smp 4 -cpu host \
            -drive file=windows.qcow2,format=qcow2,if=virtio \
            -cdrom win11.iso \
            -boot order=dc \
            -net nic,model=virtio -net user,hostfwd=tcp::3389-:3389 \
            -vga virtio -display none \
            -daemonize &

      - name: Install Tailscale on Linux Host (for easy management)
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}   # Optional if you have OAuth, else skip or use authkey below
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          # Agar OAuth nahi bana to upar wala secret TS_AUTHKEY use kar sakte ho manually

      - name: Wait for VM to Boot + Tailscale Setup Inside Windows (PowerShell)
        run: |
          sleep 120  # Wait for Windows to start booting
          echo "VM running... Tailscale will be installed inside Windows via guest execution (simulated here)"
          # Real mein pehli baar manually RDP (local port) se connect karke Tailscale install kar lo
          # Ya advanced: QEMU guest agent + PowerShell script for auto download

      - name: Keep Running
        run: sleep 21600  # 6 hours
