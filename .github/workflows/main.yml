name: Linux Runner pe Windows RDP (8GB RAM + 4 Cores - Simple)

on:
  workflow_dispatch:

jobs:
  windows-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 9999

    steps:
      - name: Install QEMU, KVM and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf virt-viewer bridge-utils socat
          sudo modprobe kvm

      - name: Download Windows 11 ISO (Latest Evaluation 2026)
        run: |
          # Official Microsoft Windows 11 Enterprise Evaluation ISO (direct link)
          wget -O win11.iso https://go.microsoft.com/fwlink/?linkid=2334167

      - name: Create Virtual Disk (80GB)
        run: |
          qemu-img create -f qcow2 windows.qcow2 80G

      - name: Start Windows VM with QEMU (8GB RAM + 4 Cores + RDP Forward)
        run: |
          qemu-system-x86_64 \
            -m 8192 -smp 4 -cpu host \
            -drive file=windows.qcow2,format=qcow2,if=virtio \
            -cdrom win11.iso \
            -boot order=dc \
            -net nic,model=virtio -net user,hostfwd=tcp::3389-:3389 \
            -vga virtio -display none \
            -daemonize &

      - name: Setup ngrok Tunnel for RDP
        run: |
          wget https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          tar -xzf ngrok-v3-stable-linux-amd64.tgz
          ./ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          ./ngrok tcp 3389 --log=stdout &

      - name: Keep Running
        run: sleep 21600  # 6 hours
